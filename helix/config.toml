theme = "catppuccin_mocha"

[editor]
line-number = "relative"
auto-format = true
scroll-lines = 1
bufferline = "multiple"
idle-timeout = 200

[editor.cursor-shape] 
insert = "bar"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-base-name"]

[editor.soft-wrap]
enable = true

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
